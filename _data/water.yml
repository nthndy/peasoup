# Water chemistry log. Readings from a MARS Fishcare wide-range test kit.
#
# `targets` defines the safe/warn bands for each parameter, used to
# colour-code readings automatically, and a `range` used as the chart axis:
#   inside safe band                -> good   (green)
#   inside warn band, outside safe  -> watch  (mauve)
#   outside warn band               -> act    (magenta)
#
# `log` is newest-first. Add a new block at the TOP each time you test.
# Units: ammonia / nitrite / phosphate in ppm, pH unitless.
# `note` is optional. `photos` is an optional list of paths under
# /assets/img/ — omit the key entirely when there aren't any.

targets:
  ammonia:   { unit: "ppm", safe: [0, 0.25],  warn: [0, 1.0], range: [0, 8] }
  nitrite:   { unit: "ppm", safe: [0, 0.25],  warn: [0, 1.0], range: [0, 5] }
  phosphate: { unit: "ppm", safe: [0, 1.0],   warn: [0, 5.0], range: [0, 10] }
  ph:        { unit: "",    safe: [6.5, 8.5], warn: [6.0, 9.0], range: [5, 9] }

log:
  - date: 2026-07-19
    ammonia: 0.25
    nitrite: 0
    phosphate: 1
    ph: 9
    note: >-
      Big improvement across the board despite a full algal bloom. Nitrite
      cleared to zero and ammonia falling as the cycle catches up; phosphate
      down to 1 ppm, the lowest yet, after a clear-out of decaying matter.
      pH still stuck at 9.

  - date: 2026-07-15
    ammonia: 2
    nitrite: 2
    phosphate: 5
    ph: 9
    note: >-
      Ammonia and nitrite both up from zero: the pond is cycling as the
      water soldier and some hornwort die back and start to decompose.
      Phosphate still down at 5 since planting. pH unmoved.

  - date: 2026-07-06
    ammonia: 0
    nitrite: 0
    phosphate: 5
    ph: 9
    note: >-
      Phosphate halved four days after planting. Ammonia and nitrite still at
      zero, nothing decomposing yet.

  - date: 2026-07-02
    ammonia: 0
    nitrite: 0
    phosphate: 10
    ph: 9
    note: Planting day, tested before the plants went in. Phosphate at the top of the chart.

  - date: 2026-06-30
    ammonia: 0
    nitrite: 0
    phosphate: 10
    ph: 8
    note: >-
      Baseline, before the refill. Readings taken indoors so the pH is the
      least certain of the four; somewhere between 8 and 9.