  checks:
    - date: 2026-07-15
      status: thriving
      note: Going absolutely nuts. Several new pads this week.
    - date: 2026-07-08
      status: steady
      note: One new pad appearing as the larger pad dies back.
    - date: 2026-07-02
      status: planted
      note: Planted out.

