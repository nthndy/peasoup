# Plant inventory. Add an entry per plant. Duplicate a block to add a new one.
#
# Each plant carries its history as `checks`, a list of dated health checks,
# newest-first. The first entry in `checks` is the plant's current state —
# there is no separate top-level status/checked field any more.
#
# checks[].status: one of  planted | thriving | steady | struggling | lost
#   planted    = light green, just went in, no verdict yet
#   thriving   = green,        growing well
#   steady     = mauve,        holding, no change
#   struggling = magenta,      needs attention
#   lost       = grey,         died / removed (kept for the record)
#
# checks[].note: optional.
# checks[].photos: optional list of paths under /assets/img/. Most checks
#   won't have any — omit the key entirely rather than leaving it blank.
#
# zone: marginal | oxygenator | floating | deep-water | bog
# added: date the plant went in (YYYY-MM-DD)
# There is no plant-level `photo` any more — photos live on individual checks.

- name: Hornwort
  latin: Ceratophyllum demersum
  zone: oxygenator
  added: 2026-07-02
  notes: Weighted bunch. Throw on the surface and it sinks, or push into soil.
  checks:
    - date: 2026-07-11
      status: steady
      note: >-
        The three bunches added on the 8th melted away within days — the
        heat and the pH of 9 did for them. The original planting is holding.
    - date: 2026-07-08
      status: thriving
      note: Three more bunches added to bulk up the oxygenators.
    - date: 2026-07-02
      status: planted
      note: Planted out.

- name: Willow moss
  latin: Fontinalis antipyretica
  zone: oxygenator
  added: 2026-07-02
  notes: Native. Prefers moving water and cooler conditions. Planting depth 20-90cm.
  checks:
    - date: 2026-07-06
      status: steady
      note: Adapting well.
    - date: 2026-07-02
      status: planted
      note: Planted out.

- name: Water starwort
  latin: Callitriche
  zone: oxygenator
  added: 2026-07-02
  notes: Native. Weighted bunch, placed just below the water line until established. Planting depth 15-45cm.
  checks:
    - date: 2026-07-11
      status: struggling
      note: Not anchoring itself. Viability uncertain.
    - date: 2026-07-02
      status: planted
      note: Planted out.

- name: Mare's tail
