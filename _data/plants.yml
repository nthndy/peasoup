- name: Water soldier
  latin: Stratiotes aloides
  zone: floating
  added: 2026-07-02
  notes: Perennial, flowers July, full sun, hardy. Drops straight in at 30cm. Sinks over winter.
  checks:
    - date: 2026-07-11
      status: lost
      note: Lost. Foliage had been falling apart since the 6th and it did not recover.
    - date: 2026-07-06
      status: struggling
      note: Foliage starting to fall apart. Not adapting well.
    - date: 2026-07-02
      status: planted
      note: Planted out.

- name: Floating heart
  latin: Nymphoides peltata
  zone: floating
  added: 2026-07-02
  notes: Native. 30-60cm of water above soil, full sun to partial shade. Flowers June-Aug.
  checks:
    - date: 2026-07-11
      status: steady
      note: Anchoring well and sending up new pads, but some older pads rotting and want grooming.
    - date: 2026-07-02
      status: planted
      note: Planted out.

- name: Alba lily
  latin: Nymphaea alba
