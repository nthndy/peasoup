# --- Site settings -----------------------------------------------------------
title: peasoup
tagline: field notes from a fountain becoming a pond
description: >-
  Progress, plants and water chemistry from turning an old garden fountain
  into a wildlife pond.
author: Nathan Day
# Set this to your live URL once Pages is enabled.
# For a project site the pattern is https://<user>.github.io/<repo>
url: "https://nthndy.github.io"
baseurl: "/peasoup"

# The Monzo handle used across the Sponsor page.
monzo: "nathanday"

# Supplier the Sponsor page links back to.
supplier_name: "Wetland Plants"
supplier_url: "https://wetland-plants.co.uk/product-category/special-offers/"

# --- Build -------------------------------------------------------------------
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
timezone: Europe/London

# Show newest posts first on listings.
paginate: false

# Files Jekyll should ignore.
exclude:
  - README.md
  - scripts/
  - Gemfile
  - Gemfile.lock
  - .github/

# Default front matter so new posts need almost none.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
