name: Refresh plant offers

on:
  schedule:
    # Every Monday at 06:00 UTC. Adjust the cron if you want it more/less often.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Scrape offers
        run: python scripts/scrape_offers.py

      - name: Commit if changed
        run: |
          git config user.name "peasoup-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain _data/offers.yml)" ]; then
            git add _data/offers.yml
            git commit -m "Refresh plant offers"
            git push
          else
            echo "No change in offers."
          fi
